<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101820" />
  <title>Gem Smash</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #9db2c0;
      --panel: rgba(12, 24, 32, 0.82);
      --panel-solid: #122530;
      --line: rgba(255, 255, 255, 0.15);
      --gold: #ffd36a;
      --danger: #ff6b7f;
      --good: #6ce0a6;
      --tile: clamp(34px, min(calc((100vw - 54px) / 8), calc((100svh - 250px) / 8)), 66px);
      --gap: 4px;
      --board: calc(var(--tile) * 8 + var(--gap) * 7);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% -10%, rgba(255, 211, 106, 0.28), transparent 30%),
        radial-gradient(circle at 90% 15%, rgba(96, 212, 255, 0.20), transparent 34%),
        linear-gradient(160deg, #081016 0%, #152a2c 42%, #291835 100%);
      color: var(--ink);
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: stretch center;
      touch-action: manipulation;
      user-select: none;
    }

    button {
      appearance: none;
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .game {
      width: min(100%, 620px);
      min-height: 100svh;
      padding: max(8px, env(safe-area-inset-top)) 8px max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 8px;
      position: relative;
      isolation: isolate;
    }

    .game::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, transparent, #000 16%, #000 80%, transparent);
      z-index: -1;
    }

    .topbar,
    .objective,
    .board-wrap,
    .level-strip,
    .menu-card,
    .modal-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px);
    }

    .topbar {
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .brand-row,
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stat-row {
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0;
    }

    .level-chip,
    .pill,
    .icon-btn,
    .primary,
    .secondary {
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .level-chip {
      padding: 8px 10px;
      font-weight: 800;
      color: #101820;
      background: linear-gradient(180deg, #ffe7a1, #ffbd3f);
      border-color: rgba(255, 255, 255, 0.38);
      white-space: nowrap;
    }

    .pill {
      min-width: 78px;
      flex: 1 1 78px;
      padding: 8px 10px;
      display: grid;
      gap: 2px;
    }

    .pill small {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pill strong {
      font-size: 17px;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
    }

    .objective {
      border-radius: 8px;
      padding: 9px 10px;
      display: grid;
      gap: 7px;
    }

    .objective-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .objective-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
      min-height: 18px;
    }

    .objective-targets {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
      text-transform: none;
      letter-spacing: 0;
    }

    .objective-chip {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px 3px 5px;
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.13);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .gem-dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--gem-light), var(--gem-mid) 48%, var(--gem-dark));
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.34), 0 2px 5px rgba(0,0,0,0.24);
      transform: rotate(45deg);
      flex: 0 0 auto;
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .booster-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .booster {
      min-height: 47px;
      border-radius: 8px;
      padding: 7px 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10);
      font-weight: 800;
    }

    .booster svg {
      width: 19px;
      height: 19px;
      stroke-width: 2.5;
    }

    .booster span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .booster-count {
      min-width: 24px;
      min-height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #101820;
      background: #ffd36a;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .booster.active {
      color: #101820;
      background: linear-gradient(180deg, #ffe7a1, #ffbd3f);
      border-color: rgba(255, 255, 255, 0.42);
    }

    .booster:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #58e19d, #ffe06d);
      border-radius: inherit;
      transition: width 260ms ease;
    }

    .board-shell {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 0;
    }

    .board-wrap {
      width: calc(var(--board) + 16px);
      max-width: calc(100vw - 16px);
      aspect-ratio: 1;
      border-radius: 8px;
      padding: 8px;
      position: relative;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), transparent 26%),
        linear-gradient(180deg, rgba(18, 43, 52, 0.95), rgba(8, 16, 22, 0.92));
      overflow: hidden;
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.10);
      pointer-events: none;
    }

    .board {
      position: relative;
      width: var(--board);
      height: var(--board);
      display: grid;
      grid-template-columns: repeat(8, var(--tile));
      grid-template-rows: repeat(8, var(--tile));
      gap: var(--gap);
      touch-action: none;
    }

    .cell {
      position: relative;
      border-radius: 8px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.10), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.12));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 -8px 14px rgba(0,0,0,0.16);
    }

    .cell.frost::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 7px;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.9), transparent 24%),
        linear-gradient(135deg, rgba(232, 251, 255, 0.88), rgba(94, 205, 244, 0.34)),
        repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,255,255,0.34) 7px 8px);
      border: 2px solid rgba(226, 251, 255, 0.84);
      box-shadow:
        inset 0 0 0 1px rgba(52, 181, 230, 0.34),
        0 0 8px rgba(123, 224, 255, 0.32);
      pointer-events: none;
    }

    .cell.flash {
      animation: tileFlash 820ms ease-in-out 2;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 246, 170, 0.55), rgba(255, 189, 63, 0.18) 42%, transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255, 211, 106, 0.16));
      box-shadow:
        inset 0 0 0 2px rgba(255, 244, 179, 0.62),
        0 0 18px rgba(255, 211, 106, 0.42);
    }

    .gem {
      position: absolute;
      width: var(--tile);
      height: var(--tile);
      left: calc(var(--x) * (var(--tile) + var(--gap)));
      top: calc(var(--y) * (var(--tile) + var(--gap)));
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: transparent;
      will-change: transform, opacity;
      transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1), filter 140ms ease, opacity 170ms ease;
      z-index: 3;
    }

    .gem button {
      width: 100%;
      height: 100%;
      padding: 0;
      border-radius: 8px;
      background: transparent;
      display: grid;
      place-items: center;
      touch-action: none;
    }

    .gem svg {
      width: 94%;
      height: 94%;
      overflow: visible;
      filter: drop-shadow(0 7px 8px rgba(0,0,0,0.38));
    }

    .gem.selected {
      transform: scale(1.08);
      z-index: 5;
      filter: brightness(1.18);
    }

    .gem.matched {
      opacity: 0;
      transform: scale(0.35) rotate(22deg);
    }

    .gem.special-flash {
      animation: gemFlash 820ms ease-in-out 2;
      z-index: 7;
    }

    .gem.spawn {
      animation: spawnGem 260ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .gem.hint {
      animation: hint 900ms ease infinite;
    }

    .special-badge {
      position: absolute;
      width: 21px;
      height: 21px;
      right: 0;
      bottom: -1px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f8fbff;
      color: #10222b;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 4px 8px rgba(0,0,0,0.32);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    @keyframes hint {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes spawnGem {
      from { opacity: 0; transform: translateY(calc(var(--tile) * -1.2)) scale(0.72); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes tileFlash {
      0%, 100% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(1.55); transform: scale(1.04); }
    }

    @keyframes gemFlash {
      0%, 100% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(1.85); transform: scale(1.16); }
    }

    .float-score {
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      color: #fff2a9;
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 3px 12px rgba(0,0,0,0.48);
      pointer-events: none;
      animation: popScore 780ms ease forwards;
      z-index: 20;
    }

    @keyframes popScore {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.65); }
      25% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
      100% { opacity: 0; transform: translate(-50%, -92%) scale(0.88); }
    }

    .level-strip {
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .secondary,
    .primary {
      min-height: 42px;
      padding: 10px 12px;
      font-weight: 800;
    }

    .primary {
      color: #101820;
      background: linear-gradient(180deg, #78ffc0, #29c475);
      border-color: rgba(255,255,255,0.42);
    }

    .secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.06));
    }

    .level-status {
      display: grid;
      gap: 2px;
      text-align: center;
      min-width: 0;
    }

    .level-status strong {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .level-status span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu,
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 12, 0.72);
      display: none;
      place-items: center;
      padding: 18px;
      z-index: 50;
    }

    .menu.open,
    .modal.open { display: grid; }

    .menu-card,
    .modal-card {
      width: min(100%, 390px);
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .menu-card h2,
    .modal-card h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .menu-card p,
    .modal-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .menu-actions {
      display: grid;
      gap: 9px;
    }

    .title-actions {
      display: none;
      gap: 9px;
    }

    .menu.title-screen .title-actions {
      display: grid;
    }

    .menu.title-screen .menu-tabs,
    .menu.title-screen .menu-actions {
      display: none;
    }

    .menu-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .menu-tab {
      min-height: 40px;
      padding: 8px 10px;
      font-weight: 800;
    }

    .menu-tab.active {
      color: #101820;
      background: linear-gradient(180deg, #ffe7a1, #ffbd3f);
    }

    .menu-panel {
      display: none;
      gap: 9px;
    }

    .menu-panel.active {
      display: grid;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      max-height: min(42svh, 330px);
      overflow: auto;
      padding: 2px;
      overscroll-behavior: contain;
    }

    .level-node {
      min-height: 58px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      gap: 1px;
      padding: 6px 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--ink);
    }

    .level-node strong {
      font-size: 15px;
      line-height: 1;
    }

    .level-node span {
      min-height: 13px;
      color: var(--gold);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .level-node small {
      color: var(--muted);
      font-size: 9px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .level-node.current {
      border-color: rgba(255, 211, 106, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 211, 106, 0.35), 0 0 12px rgba(255, 211, 106, 0.18);
    }

    .level-node.completed {
      background: linear-gradient(180deg, rgba(108, 224, 166, 0.22), rgba(255,255,255,0.08));
    }

    .level-node.locked {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .danger {
      color: #fff;
      background: linear-gradient(180deg, rgba(255, 107, 127, 0.55), rgba(145, 35, 55, 0.55));
      border-color: rgba(255, 190, 200, 0.35);
    }

    .option-row,
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      text-align: left;
    }

    .option-row span,
    .result-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .switch {
      width: 50px;
      height: 28px;
      border-radius: 999px;
      padding: 3px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      display: flex;
      justify-content: flex-start;
      flex: 0 0 auto;
    }

    .switch.on {
      justify-content: flex-end;
      background: rgba(108, 224, 166, 0.35);
    }

    .switch::before {
      content: "";
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f8fbff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    .result-stats {
      display: grid;
      gap: 8px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      min-width: min(88vw, 360px);
      padding: 12px 14px;
      border-radius: 8px;
      color: #10222b;
      background: #f8fbff;
      box-shadow: 0 16px 34px rgba(0,0,0,0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 80;
      text-align: center;
      font-weight: 800;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .landscape-block {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: #081016;
      color: #f8fbff;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .landscape-block div {
      display: grid;
      gap: 10px;
      max-width: 330px;
    }

    .landscape-block strong { font-size: 24px; }
    .landscape-block span { color: var(--muted); line-height: 1.4; }

    @media (orientation: landscape) and (max-height: 560px) {
      .landscape-block { display: grid; }
    }

    @media (max-width: 374px) {
      :root { --tile: clamp(32px, calc((100vw - 54px) / 8), 39px); }
      h1 { font-size: 21px; }
      .pill { min-width: 68px; padding: 7px 8px; }
      .pill strong { font-size: 15px; }
      .objective-text { font-size: 13px; }
      .secondary, .primary { padding-inline: 9px; font-size: 13px; }
      .cell.frost::after {
        inset: 1px;
        border-width: 2px;
        box-shadow:
          inset 0 0 0 1px rgba(52, 181, 230, 0.46),
          0 0 10px rgba(123, 224, 255, 0.44);
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="Gem Smash match three game">
    <section class="topbar">
      <div class="brand-row">
        <h1>Gem Smash</h1>
        <div class="level-chip" id="levelChip">Level 1</div>
      </div>
      <div class="stat-row">
        <div class="pill"><small>Moves</small><strong id="moves">0</strong></div>
        <div class="pill"><small>Score</small><strong id="score">0</strong></div>
        <button class="icon-btn" id="menuBtn" type="button" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
        </button>
        <button class="icon-btn" id="soundBtn" type="button" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6"/><path d="M17.5 6.5a8 8 0 0 1 0 11"/></svg>
        </button>
        <button class="icon-btn" id="restartBtn" type="button" aria-label="Restart level">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
        </button>
      </div>
    </section>

    <section class="objective" aria-live="polite">
      <div class="objective-title">
        <span>Objective</span>
        <span class="objective-targets" id="targetLine">Ready</span>
      </div>
      <p class="objective-text" id="objectiveText"></p>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
    </section>

    <section class="booster-bar" aria-label="Boosters">
      <button class="booster" id="hammerBtn" type="button" data-booster="hammer" aria-label="Use hammer booster">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 12-8.5 8.5a2.1 2.1 0 0 1-3-3L12 9"/><path d="m17.6 8.4 2.8-2.8"/><path d="m14 5 5 5"/><path d="m11 2 11 11"/><path d="m7 8 4-4"/></svg>
        <span>Hammer</span>
        <strong class="booster-count" id="hammerCount">0</strong>
      </button>
      <button class="booster" id="shuffleBtn" type="button" data-booster="shuffle" aria-label="Use shuffle booster">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.8c2.8 0 4.2-1.4 5.8-4.8l.8-1.7C12 8.1 13.4 6 16.2 6H22"/><path d="M2 6h1.8c2.2 0 3.6.9 4.8 3"/><path d="M14 16.5c.7.9 1.4 1.5 2.2 1.5H22"/></svg>
        <span>Shuffle</span>
        <strong class="booster-count" id="shuffleCount">0</strong>
      </button>
      <button class="booster" id="lineBtn" type="button" data-booster="line" aria-label="Use line blast booster">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20"/><path d="M2 12h20"/><path d="m5 5 14 14"/><path d="m19 5-14 14"/></svg>
        <span>Blast</span>
        <strong class="booster-count" id="lineCount">0</strong>
      </button>
    </section>

    <section class="board-shell">
      <div class="board-wrap">
        <div class="board" id="board" aria-label="Gem board"></div>
      </div>
    </section>

    <section class="level-strip">
      <button class="secondary" id="prevBtn" type="button">Previous</button>
      <div class="level-status">
        <strong id="levelName">Crystal Start</strong>
        <span id="levelMeta">200 levels available offline</span>
      </div>
      <button class="primary" id="nextBtn" type="button">Next</button>
    </section>
  </main>

  <div class="menu open" id="menu" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <div class="menu-card">
      <h2 id="menuTitle">Gem Smash</h2>
      <p id="menuProgress">Level 1 unlocked</p>
      <div class="title-actions" id="titleActions">
        <button class="primary" id="resumeBtn" type="button">Resume Level 1</button>
        <button class="secondary" id="chooseLevelBtn" type="button">Choose Level</button>
        <button class="secondary danger" id="titleClearDataBtn" type="button">Clear Data / Restart</button>
      </div>
      <div class="menu-tabs">
        <button class="secondary menu-tab active" id="playTabBtn" type="button">Play</button>
        <button class="secondary menu-tab" id="levelsTabBtn" type="button">Levels</button>
      </div>
      <div class="menu-actions">
        <div class="menu-panel active" id="playPanel">
          <button class="primary" id="continueBtn" type="button">Play Current Level</button>
          <button class="secondary" id="newRunBtn" type="button">Replay Current Level</button>
          <div class="option-row">
            <div><strong>Sound</strong><br><span>Gem taps and level cues</span></div>
            <button class="switch on" id="menuSoundBtn" type="button" aria-label="Toggle sound"></button>
          </div>
          <div class="option-row">
            <div><strong>Hints</strong><br><span>Show a move after a pause</span></div>
            <button class="switch on" id="menuHintsBtn" type="button" aria-label="Toggle hints"></button>
          </div>
          <button class="secondary danger" id="clearDataBtn" type="button">Clear Data</button>
        </div>
        <div class="menu-panel" id="levelsPanel">
          <div class="level-grid" id="levelGrid" aria-label="Level progress"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">Level Complete</h2>
      <p id="modalText"></p>
      <div class="result-stats" id="modalStats"></div>
      <div class="modal-actions">
        <button class="secondary" id="modalReplay" type="button">Replay</button>
        <button class="primary" id="modalNext" type="button">Continue</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="landscape-block">
    <div>
      <strong>Portrait Only</strong>
      <span>Rotate your device upright to play Gem Smash.</span>
    </div>
  </div>

  <script>
    const SIZE = 8;
    const MAX_LEVELS = 200;
    const GEM_TYPES = [
      { id: "ruby", name: "Ruby", colors: ["#ff8793", "#ef2f59", "#9f1739"], shape: "hex" },
      { id: "topaz", name: "Topaz", colors: ["#ffe38d", "#f5a726", "#a85b08"], shape: "diamond" },
      { id: "emerald", name: "Emerald", colors: ["#92f7b8", "#22b96e", "#087749"], shape: "emerald" },
      { id: "sapphire", name: "Sapphire", colors: ["#9dd7ff", "#2f87e7", "#1746a2"], shape: "kite" },
      { id: "amethyst", name: "Amethyst", colors: ["#dda9ff", "#944ce6", "#522195"], shape: "oct" },
      { id: "opal", name: "Opal", colors: ["#fcffff", "#7fdbe7", "#407c93"], shape: "round" }
    ];
    const STORAGE_KEY = "lynettes-smash-save-v1";
    const BOOSTER_TYPES = ["hammer", "shuffle", "line"];
    let nextGemId = 1;
    const state = {
      level: 1,
      unlocked: 1,
      board: [],
      moves: 0,
      startMoves: 0,
      score: 0,
      selected: null,
      busy: false,
      sound: true,
      hints: true,
      completions: {},
      stats: {},
      failures: {},
      boosters: { hammer: 0, shuffle: 0, line: 0 },
      inventory: { hammer: 0, shuffle: 0, line: 0 },
      assistBoosters: { hammer: 0, shuffle: 0, line: 0 },
      activeBooster: null,
      frost: [],
      hintTimer: null,
      levelDone: false,
      pointer: null,
      lastSwipeAt: 0
    };

    const el = {
      board: document.getElementById("board"),
      levelChip: document.getElementById("levelChip"),
      moves: document.getElementById("moves"),
      score: document.getElementById("score"),
      targetLine: document.getElementById("targetLine"),
      objectiveText: document.getElementById("objectiveText"),
      progressBar: document.getElementById("progressBar"),
      levelName: document.getElementById("levelName"),
      levelMeta: document.getElementById("levelMeta"),
      menu: document.getElementById("menu"),
      menuBtn: document.getElementById("menuBtn"),
      titleActions: document.getElementById("titleActions"),
      resumeBtn: document.getElementById("resumeBtn"),
      chooseLevelBtn: document.getElementById("chooseLevelBtn"),
      titleClearDataBtn: document.getElementById("titleClearDataBtn"),
      playTabBtn: document.getElementById("playTabBtn"),
      levelsTabBtn: document.getElementById("levelsTabBtn"),
      playPanel: document.getElementById("playPanel"),
      levelsPanel: document.getElementById("levelsPanel"),
      continueBtn: document.getElementById("continueBtn"),
      newRunBtn: document.getElementById("newRunBtn"),
      clearDataBtn: document.getElementById("clearDataBtn"),
      levelGrid: document.getElementById("levelGrid"),
      menuProgress: document.getElementById("menuProgress"),
      menuSoundBtn: document.getElementById("menuSoundBtn"),
      menuHintsBtn: document.getElementById("menuHintsBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      restartBtn: document.getElementById("restartBtn"),
      soundBtn: document.getElementById("soundBtn"),
      hammerBtn: document.getElementById("hammerBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      lineBtn: document.getElementById("lineBtn"),
      hammerCount: document.getElementById("hammerCount"),
      shuffleCount: document.getElementById("shuffleCount"),
      lineCount: document.getElementById("lineCount"),
      modal: document.getElementById("modal"),
      modalTitle: document.getElementById("modalTitle"),
      modalText: document.getElementById("modalText"),
      modalStats: document.getElementById("modalStats"),
      modalReplay: document.getElementById("modalReplay"),
      modalNext: document.getElementById("modalNext"),
      toast: document.getElementById("toast")
    };

    function levelConfig(level) {
      const index = level - 1;
      const palette = Math.min(6, 4 + Math.floor(index / 10));
      const frost = Math.max(0, Math.floor((index - 3) / 2.5));
      const moves = Math.max(15, 23 - Math.floor(index / 7) - Math.floor(index / 45));
      const targetScore = 1700 + index * 145 + Math.floor(index / 8) * 520 + Math.floor(index * index * 0.35);
      const typeCycle = index % 5;
      const collectType = GEM_TYPES[index % palette].id;
      const collectTwo = GEM_TYPES[(index + 2) % palette].id;
      const collectTarget = Math.min(70, 16 + Math.floor(index * 1.02) + Math.floor(index / 18));
      const frostTarget = Math.min(34, 9 + Math.floor(index * 0.7) + Math.floor(index / 18));
      let objective;
      if (typeCycle === 0) {
        objective = { kind: "score", targetScore };
      } else if (typeCycle === 1) {
        objective = { kind: "collect", collect: { [collectType]: collectTarget } };
      } else if (typeCycle === 2) {
        objective = { kind: "frost", frostTarget };
      } else if (typeCycle === 3) {
        objective = { kind: "scoreCollect", targetScore: Math.round(targetScore * 0.78), collect: { [collectType]: Math.max(8, collectTarget - 4) } };
      } else {
        objective = { kind: "doubleCollect", collect: { [collectType]: Math.max(8, collectTarget - 5), [collectTwo]: Math.max(7, collectTarget - 7) } };
      }
      const frostCount = objective.frostTarget ? objective.frostTarget : frost;
      return {
        level,
        name: levelName(level),
        palette,
        moves,
        frost: Math.min(34, frostCount),
        objective
      };
    }

    function levelName(level) {
      const names = ["Crystal Start", "Ruby Lift", "Topaz Run", "Emerald Bend", "Sapphire Steps", "Amethyst Gate", "Opal Drift", "Vault Spark", "Prism Path", "Crown Crush"];
      return names[(level - 1) % names.length] + " " + Math.ceil(level / 10);
    }

    function loadSave() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.unlocked = Math.max(1, Math.min(MAX_LEVELS, saved.unlocked || 1));
        state.level = Math.max(1, Math.min(state.unlocked, saved.level || 1));
        state.sound = saved.sound !== false;
        state.hints = saved.hints !== false;
        state.completions = saved.completions && typeof saved.completions === "object" ? saved.completions : {};
        state.failures = saved.failures && typeof saved.failures === "object" ? saved.failures : {};
        state.inventory = normalizeBoosters(saved.inventory);
      } catch {
        state.level = 1;
        state.unlocked = 1;
        state.completions = {};
        state.failures = {};
        state.inventory = { hammer: 0, shuffle: 0, line: 0 };
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        level: state.level,
        unlocked: state.unlocked,
        sound: state.sound,
        hints: state.hints,
        completions: state.completions,
        failures: state.failures,
        inventory: state.inventory
      }));
    }

    function normalizeBoosters(source) {
      const boosters = { hammer: 0, shuffle: 0, line: 0 };
      if (!source || typeof source !== "object") return boosters;
      for (const type of BOOSTER_TYPES) {
        boosters[type] = Math.max(0, Number(source[type]) || 0);
      }
      return boosters;
    }

    function combinedBoosters(assist) {
      const boosters = {};
      for (const type of BOOSTER_TYPES) {
        boosters[type] = (state.inventory[type] || 0) + (assist[type] || 0);
      }
      return boosters;
    }

    function startLevel(level = state.level) {
      state.level = Math.max(1, Math.min(MAX_LEVELS, level));
      const cfg = levelConfig(state.level);
      const assist = retryAssist(state.level);
      state.moves = cfg.moves + assist.moves;
      state.startMoves = state.moves;
      state.score = 0;
      state.stats = { collected: {}, frostCleared: 0, gemsCleared: 0, bestChain: 0, biggestSmash: 0 };
      state.assistBoosters = { hammer: assist.hammer, shuffle: assist.shuffle, line: assist.line };
      state.boosters = combinedBoosters(state.assistBoosters);
      state.activeBooster = null;
      state.frost = makeFrost(cfg.frost);
      state.selected = null;
      state.busy = false;
      state.levelDone = false;
      state.board = makeBoard(cfg);
      ensureMoveExists();
      el.modal.classList.remove("open");
      clearHint();
      render();
      queueHint();
      save();
      if (assist.message) toast(assist.message);
    }

    function retryAssist(level) {
      const failures = state.failures[String(level)] || 0;
      const extraMoves = Math.max(failures >= 2 ? 3 : 0, Math.floor(failures / 3) * 3);
      return {
        moves: extraMoves,
        hammer: failures >= 4 ? 1 : 0,
        shuffle: failures >= 6 ? 1 : 0,
        line: failures >= 8 ? 1 : 0,
        message: assistMessage(failures, extraMoves)
      };
    }

    function assistMessage(failures, extraMoves) {
      if (!extraMoves && failures < 4) return "";
      const parts = [];
      if (extraMoves) parts.push(`+${extraMoves} moves`);
      if (failures >= 4) parts.push("Hammer");
      if (failures >= 6) parts.push("Shuffle");
      if (failures >= 8) parts.push("Blast");
      if (parts.length) return `Retry assist: ${parts.join(", ")}.`;
      return "";
    }

    function makeBoard(cfg) {
      const board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          board[y][x] = newGem(cfg.palette, board, x, y);
        }
      }
      return board;
    }

    function newGem(palette, board, x, y) {
      let type;
      do {
        type = randomType(palette);
      } while (
        (x >= 2 && board[y][x - 1]?.type === type && board[y][x - 2]?.type === type) ||
        (y >= 2 && board[y - 1][x]?.type === type && board[y - 2][x]?.type === type)
      );
      return { id: nextGemId++, type, special: null };
    }

    function randomType(palette = levelConfig(state.level).palette) {
      return GEM_TYPES[Math.floor(Math.random() * palette)].id;
    }

    function makeFrost(count) {
      const frost = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
      const spots = [];
      for (let y = 1; y < SIZE - 1; y++) {
        for (let x = 1; x < SIZE - 1; x++) spots.push({ x, y });
      }
      shuffle(spots).slice(0, count).forEach(({ x, y }) => {
        frost[y][x] = true;
      });
      return frost;
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function render() {
      const cfg = levelConfig(state.level);
      el.levelChip.textContent = `Level ${state.level}`;
      el.moves.textContent = state.moves;
      el.score.textContent = state.score;
      el.levelName.textContent = cfg.name;
      el.levelMeta.textContent = `${state.unlocked} unlocked / ${MAX_LEVELS} levels`;
      el.prevBtn.disabled = state.level <= 1 || state.busy;
      el.nextBtn.disabled = state.level >= state.unlocked || state.busy;
      el.menuProgress.textContent = `Level ${state.level} selected | ${completedCount()} complete | ${state.unlocked} unlocked`;
      el.resumeBtn.textContent = `Resume Level ${state.level}`;
      renderObjective(cfg);
      renderBoosters();
      renderBoard();
      renderLevelGrid();
      updateSoundIcon();
    }

    function renderBoosters() {
      for (const type of BOOSTER_TYPES) {
        const button = el[`${type}Btn`];
        const count = state.boosters[type] || 0;
        button.classList.toggle("active", state.activeBooster === type);
        button.disabled = state.busy || state.levelDone || count <= 0;
        el[`${type}Count`].textContent = count;
      }
    }

    function renderObjective(cfg) {
      const objective = cfg.objective;
      const parts = [];
      if (objective.targetScore) parts.push(statusChip(`${Math.min(state.score, objective.targetScore).toLocaleString()} / ${objective.targetScore.toLocaleString()} score`));
      if (objective.frostTarget) parts.push(statusChip(`${state.stats.frostCleared || 0} / ${objective.frostTarget} frost`));
      if (objective.collect) {
        for (const [type, target] of Object.entries(objective.collect)) {
          parts.push(targetChip(type, `${state.stats.collected[type] || 0} / ${target} ${gemName(type)}`));
        }
      }
      el.targetLine.innerHTML = parts.join("");
      el.objectiveText.innerHTML = objectiveText(objective);
      el.progressBar.style.width = `${Math.round(progressFor(objective) * 100)}%`;
    }

    function completedCount() {
      return Object.keys(state.completions).length;
    }

    function resultStars() {
      const efficiency = state.startMoves ? state.moves / state.startMoves : 0;
      if (efficiency >= 0.35) return 3;
      if (efficiency >= 0.16) return 2;
      return 1;
    }

    function recordCompletion() {
      const level = String(state.level);
      const previous = state.completions[level];
      const result = {
        level: state.level,
        stars: resultStars(),
        score: state.score,
        movesUsed: state.startMoves - state.moves,
        movesLeft: state.moves,
        gemsCleared: state.stats.gemsCleared || 0,
        biggestSmash: state.stats.biggestSmash || 0,
        bestChain: state.stats.bestChain || 0,
        completedAt: new Date().toISOString()
      };
      const previousStars = previous?.stars || 0;
      const reward = completionReward(state.level, previousStars, result.stars);
      if (!previous || result.stars > previous.stars || (result.stars === previous.stars && result.score > previous.score)) {
        state.completions[level] = result;
      }
      addReward(reward);
      state.failures[level] = 0;
      return reward;
    }

    function completionReward(level, previousStars, stars) {
      const reward = { hammer: 0, shuffle: 0, line: 0 };
      if (stars <= previousStars) return reward;
      for (let star = previousStars + 1; star <= stars; star++) {
        if (star === 2) reward.hammer++;
        if (star === 3) reward.shuffle++;
      }
      if (previousStars === 0) {
        if (level % 5 === 0) reward.hammer++;
        if (level % 10 === 0) reward.line++;
      }
      return reward;
    }

    function addReward(reward) {
      for (const type of BOOSTER_TYPES) {
        state.inventory[type] = (state.inventory[type] || 0) + (reward[type] || 0);
      }
      state.boosters = combinedBoosters(state.assistBoosters);
    }

    function rewardText(reward) {
      const names = { hammer: "Hammer", shuffle: "Shuffle", line: "Blast" };
      const parts = BOOSTER_TYPES
        .filter(type => reward?.[type])
        .map(type => `${reward[type]} ${names[type]}`);
      return parts.length ? parts.join(", ") : "";
    }

    function renderLevelGrid() {
      let html = "";
      for (let level = 1; level <= MAX_LEVELS; level++) {
        const result = state.completions[String(level)];
        const unlocked = level <= state.unlocked;
        const classes = [
          "level-node",
          result ? "completed" : "",
          level === state.level ? "current" : "",
          unlocked ? "" : "locked"
        ].filter(Boolean).join(" ");
        const stars = result ? "★".repeat(result.stars) + "☆".repeat(3 - result.stars) : unlocked ? "Ready" : "Locked";
        const score = result ? result.score.toLocaleString() : "";
        html += `<button class="${classes}" type="button" data-level="${level}" ${unlocked ? "" : "disabled"}>
          <strong>${level}</strong>
          <span>${stars}</span>
          <small>${score}</small>
        </button>`;
      }
      el.levelGrid.innerHTML = html;
    }

    function objectiveText(objective) {
      if (objective.kind === "score") return `Reach ${objective.targetScore.toLocaleString()} points.`;
      if (objective.kind === "collect") return `Collect ${collectText(objective.collect)}.`;
      if (objective.kind === "frost") return `Clear ${objective.frostTarget} frosted tiles.`;
      if (objective.kind === "scoreCollect") return `Reach ${objective.targetScore.toLocaleString()} points and collect ${collectText(objective.collect)}.`;
      return `Collect ${collectText(objective.collect)}.`;
    }

    function collectText(collect) {
      return Object.entries(collect).map(([type, target]) => `${target} ${gemName(type)} ${gemSwatch(type)}`).join(" and ");
    }

    function gemName(type) {
      return GEM_TYPES.find(g => g.id === type)?.name || type;
    }

    function gemData(type) {
      return GEM_TYPES.find(g => g.id === type) || GEM_TYPES[0];
    }

    function targetChip(type, label) {
      return `<span class="objective-chip">${gemSwatch(type)}${label}</span>`;
    }

    function statusChip(label) {
      return `<span class="objective-chip">${label}</span>`;
    }

    function gemSwatch(type) {
      const gem = gemData(type);
      return `<span class="gem-dot" aria-label="${gem.name} color" style="--gem-light:${gem.colors[0]};--gem-mid:${gem.colors[1]};--gem-dark:${gem.colors[2]}"></span>`;
    }

    function progressFor(objective) {
      const portions = [];
      if (objective.targetScore) portions.push(Math.min(1, state.score / objective.targetScore));
      if (objective.frostTarget) portions.push(Math.min(1, (state.stats.frostCleared || 0) / objective.frostTarget));
      if (objective.collect) {
        for (const [type, target] of Object.entries(objective.collect)) {
          portions.push(Math.min(1, (state.stats.collected[type] || 0) / target));
        }
      }
      return portions.length ? portions.reduce((a, b) => a + b, 0) / portions.length : 0;
    }

    function renderBoard() {
      const previous = new Map();
      el.board.querySelectorAll(".gem[data-id]").forEach(node => {
        previous.set(node.dataset.id, node.getBoundingClientRect());
      });
      const selectedKey = state.selected ? key(state.selected.x, state.selected.y) : "";
      let html = "";
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          html += `<div class="cell${state.frost[y]?.[x] ? " frost" : ""}" data-cell="${key(x, y)}" style="grid-column:${x + 1};grid-row:${y + 1}"></div>`;
        }
      }
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const gem = state.board[y][x];
          if (!gem) continue;
          html += `<div class="gem${selectedKey === key(x, y) ? " selected" : ""}" data-id="${gem.id}" data-key="${key(x, y)}" style="--x:${x};--y:${y}">
            <button type="button" aria-label="${gemName(gem.type)} gem">${gemSvg(gem.type)}${gem.special ? specialBadge(gem.special) : ""}</button>
          </div>`;
        }
      }
      el.board.innerHTML = html;
      el.board.querySelectorAll(".gem[data-id]").forEach(node => {
        const oldBox = previous.get(node.dataset.id);
        if (!oldBox) {
          node.classList.add("spawn");
          return;
        }
        const newBox = node.getBoundingClientRect();
        const dx = oldBox.left - newBox.left;
        const dy = oldBox.top - newBox.top;
        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
          node.style.transform = `translate(${dx}px, ${dy}px)`;
          node.style.transition = "none";
          requestAnimationFrame(() => {
            node.style.transition = "";
            node.style.transform = "";
          });
        }
      });
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function gemSvg(type) {
      const gem = GEM_TYPES.find(g => g.id === type);
      const id = `g-${type}`;
      const points = {
        hex: "50,4 86,22 92,62 50,96 8,62 14,22",
        diamond: "50,3 94,48 50,97 6,48",
        emerald: "28,6 72,6 94,28 94,72 72,94 28,94 6,72 6,28",
        kite: "50,2 88,34 70,94 30,94 12,34",
        oct: "32,5 68,5 95,32 95,68 68,95 32,95 5,68 5,32",
        round: "50,5 78,15 95,42 88,74 60,96 28,88 6,62 14,27"
      }[gem.shape];
      return `<svg viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <linearGradient id="${id}" x1="20%" y1="8%" x2="82%" y2="96%">
            <stop offset="0" stop-color="${gem.colors[0]}"/>
            <stop offset="0.46" stop-color="${gem.colors[1]}"/>
            <stop offset="1" stop-color="${gem.colors[2]}"/>
          </linearGradient>
          <radialGradient id="${id}-shine" cx="30%" cy="22%" r="45%">
            <stop offset="0" stop-color="#fff" stop-opacity="0.85"/>
            <stop offset="0.42" stop-color="#fff" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <polygon points="${points}" fill="url(#${id})" stroke="rgba(255,255,255,0.72)" stroke-width="3" />
        <polygon points="50,9 74,25 62,45 50,93 38,45 26,25" fill="rgba(255,255,255,0.16)" />
        <polygon points="18,30 38,45 50,93 14,62" fill="rgba(0,0,0,0.12)" />
        <polygon points="82,30 62,45 50,93 86,62" fill="rgba(0,0,0,0.20)" />
        <ellipse cx="33" cy="24" rx="18" ry="12" fill="url(#${id}-shine)" transform="rotate(-24 33 24)" />
      </svg>`;
    }

    function specialBadge(special) {
      return `<span class="special-badge">${special === "row" ? "↔" : special === "col" ? "↕" : "✦"}</span>`;
    }

    function onBoardTap(event) {
      if (Date.now() - state.lastSwipeAt < 350) return;
      const gemEl = event.target.closest(".gem");
      const cellEl = event.target.closest(".cell");
      if (state.busy || state.levelDone) return;
      if (state.activeBooster) {
        const targetEl = gemEl || cellEl;
        if (!targetEl) return;
        const rawKey = targetEl.dataset.key || targetEl.dataset.cell;
        if (!rawKey) return;
        const [x, y] = rawKey.split(",").map(Number);
        useTargetedBooster(x, y);
        return;
      }
      if (!gemEl) return;
      const [x, y] = gemEl.dataset.key.split(",").map(Number);
      if (!state.selected) {
        state.selected = { x, y };
        renderBoard();
        return;
      }
      const first = state.selected;
      const second = { x, y };
      if (first.x === second.x && first.y === second.y) {
        state.selected = null;
        renderBoard();
        return;
      }
      if (!adjacent(first, second)) {
        state.selected = second;
        renderBoard();
        return;
      }
      clearHint();
      attemptSwap(first, second);
    }

    function onPointerDown(event) {
      if (state.activeBooster) return;
      const gemEl = event.target.closest(".gem");
      if (!gemEl || state.busy || state.levelDone) return;
      const [x, y] = gemEl.dataset.key.split(",").map(Number);
      state.pointer = { x, y, startX: event.clientX, startY: event.clientY, lastX: event.clientX, lastY: event.clientY };
      if (event.pointerId !== undefined && event.currentTarget.setPointerCapture) {
        try {
          event.currentTarget.setPointerCapture(event.pointerId);
        } catch {}
      }
    }

    function onPointerMove(event) {
      if (!state.pointer) return;
      state.pointer.lastX = event.clientX;
      state.pointer.lastY = event.clientY;
      const dx = event.clientX - state.pointer.startX;
      const dy = event.clientY - state.pointer.startY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) > 8) event.preventDefault();
    }

    function onPointerUp(event) {
      if (!state.pointer || state.busy || state.levelDone) {
        state.pointer = null;
        return;
      }
      const start = state.pointer;
      state.pointer = null;
      const endX = event.clientX || start.lastX;
      const endY = event.clientY || start.lastY;
      const dx = endX - start.startX;
      const dy = endY - start.startY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
      const horizontal = Math.abs(dx) > Math.abs(dy);
      const target = {
        x: start.x + (horizontal ? Math.sign(dx) : 0),
        y: start.y + (horizontal ? 0 : Math.sign(dy))
      };
      if (!inside(target.x, target.y)) return;
      state.lastSwipeAt = Date.now();
      state.selected = null;
      clearHint();
      attemptSwap({ x: start.x, y: start.y }, target);
      event.preventDefault();
    }

    function touchPoint(event) {
      return event.changedTouches?.[0] || event.touches?.[0] || null;
    }

    function onTouchStart(event) {
      if (window.PointerEvent) return;
      if (state.activeBooster) return;
      const gemEl = event.target.closest(".gem");
      const point = touchPoint(event);
      if (!gemEl || !point || state.busy || state.levelDone) return;
      const [x, y] = gemEl.dataset.key.split(",").map(Number);
      state.pointer = { x, y, startX: point.clientX, startY: point.clientY, lastX: point.clientX, lastY: point.clientY };
    }

    function onTouchMove(event) {
      if (window.PointerEvent || !state.pointer) return;
      const point = touchPoint(event);
      if (!point) return;
      state.pointer.lastX = point.clientX;
      state.pointer.lastY = point.clientY;
      const dx = point.clientX - state.pointer.startX;
      const dy = point.clientY - state.pointer.startY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) > 8) event.preventDefault();
    }

    function onTouchEnd(event) {
      if (window.PointerEvent || !state.pointer) return;
      const point = touchPoint(event);
      if (!point) {
        state.pointer = null;
        return;
      }
      onPointerUp({ clientX: point.clientX, clientY: point.clientY, preventDefault: () => event.preventDefault() });
    }

    async function attemptSwap(a, b) {
      state.busy = true;
      state.selected = null;
      swap(a, b);
      render();
      await wait(190);
      let matches = findMatches();
      const specialHits = [];
      if (state.board[a.y][a.x]?.special) specialHits.push(a);
      if (state.board[b.y][b.x]?.special) specialHits.push(b);
      if (!matches.length && !specialHits.length) {
        swap(a, b);
        buzz();
        render();
        state.busy = false;
        queueHint();
        return;
      }
      state.moves--;
      tickSound(420, 0.045);
      if (specialHits.length) {
        matches = matches.concat(specialHits.map(pos => ({ cells: specialCells(pos), maker: pos, type: "special" })));
      }
      await resolve(matches, a, b);
      state.busy = false;
      render();
      checkEnd();
      queueHint();
    }

    async function useTargetedBooster(x, y) {
      const type = state.activeBooster;
      if (!type || type === "shuffle" || !inside(x, y) || (state.boosters[type] || 0) <= 0) return;
      state.busy = true;
      state.selected = null;
      state.activeBooster = null;
      if (!spendBooster(type)) {
        state.busy = false;
        render();
        return;
      }
      renderBoosters();
      clearHint();
      const cells = type === "line" ? lineBlastCells(x, y) : [{ x, y }];
      flashCells(cells);
      tickSound(type === "line" ? 640 : 500, 0.05);
      await wait(type === "line" ? 520 : 240);
      await resolve([{ cells, maker: { x, y }, type: "special" }], { x, y }, { x, y });
      state.busy = false;
      render();
      checkEnd();
      queueHint();
    }

    function lineBlastCells(x, y) {
      const cells = [];
      for (let col = 0; col < SIZE; col++) cells.push({ x: col, y });
      for (let row = 0; row < SIZE; row++) {
        if (row !== y) cells.push({ x, y: row });
      }
      return cells;
    }

    async function resolve(initialMatches, a, b) {
      let matches = initialMatches;
      let chain = 0;
      while (matches.length) {
        chain++;
        state.stats.bestChain = Math.max(state.stats.bestChain || 0, chain);
        const clearMap = new Map();
        let specialToCreate = null;
        for (const match of matches) {
          for (const cell of match.cells) clearMap.set(key(cell.x, cell.y), cell);
          if (!specialToCreate && match.type !== "special" && match.cells.length >= 4) {
            specialToCreate = chooseSpecial(match, a, b);
          }
        }
        let specialExpanded = false;
        for (const cell of [...clearMap.values()]) {
          const gem = state.board[cell.y][cell.x];
          if (!gem?.special) continue;
          specialExpanded = true;
          for (const specialCell of specialCells(cell)) {
            clearMap.set(key(specialCell.x, specialCell.y), specialCell);
          }
        }
        const cleared = [...clearMap.values()];
        const usedSpecial = specialExpanded || matches.some(match => match.type === "special");
        state.stats.biggestSmash = Math.max(state.stats.biggestSmash || 0, cleared.length);
        if (usedSpecial) {
          flashCells(cleared);
          tickSound(560, 0.045);
          await wait(1800);
        }
        markMatched(cleared);
        addScore(cleared.length * 65 * chain);
        recordCleared(cleared);
        await wait(usedSpecial ? 300 : 170);
        for (const { x, y } of cleared) state.board[y][x] = null;
        if (specialToCreate && state.board[specialToCreate.y]?.[specialToCreate.x] === null) {
          state.board[specialToCreate.y][specialToCreate.x] = { id: nextGemId++, type: specialToCreate.type, special: specialToCreate.special };
        }
        collapse();
        fillBoard();
        render();
        await wait(210);
        matches = findMatches();
      }
      ensureMoveExists();
    }

    function markMatched(cells) {
      for (const { x, y } of cells) {
        const node = el.board.querySelector(`[data-key="${key(x, y)}"]`);
        if (node) node.classList.add("matched");
      }
    }

    function flashCells(cells) {
      for (const { x, y } of cells) {
        const cell = el.board.querySelector(`.cell[data-cell="${key(x, y)}"]`);
        const gem = el.board.querySelector(`.gem[data-key="${key(x, y)}"]`);
        if (cell) cell.classList.add("flash");
        if (gem) gem.classList.add("special-flash");
      }
    }

    function recordCleared(cells) {
      for (const { x, y } of cells) {
        const gem = state.board[y][x];
        if (!gem) continue;
        state.stats.gemsCleared = (state.stats.gemsCleared || 0) + 1;
        state.stats.collected[gem.type] = (state.stats.collected[gem.type] || 0) + 1;
        if (state.frost[y]?.[x]) {
          state.stats.frostCleared = (state.stats.frostCleared || 0) + 1;
          state.frost[y][x] = false;
        }
      }
    }

    function addScore(points) {
      state.score += points;
      const badge = document.createElement("div");
      badge.className = "float-score";
      badge.textContent = `+${points}`;
      document.querySelector(".board-wrap").appendChild(badge);
      setTimeout(() => badge.remove(), 780);
      tickSound(Math.min(880, 360 + points / 8), 0.035);
    }

    function chooseSpecial(match, a, b) {
      const preferred = match.cells.find(c => (c.x === b.x && c.y === b.y) || (c.x === a.x && c.y === a.y)) || match.cells[Math.floor(match.cells.length / 2)];
      const base = state.board[preferred.y][preferred.x];
      return {
        x: preferred.x,
        y: preferred.y,
        type: base?.type || randomType(),
        special: match.cells.length >= 5 ? "burst" : match.orientation === "row" ? "row" : "col"
      };
    }

    function specialCells(pos) {
      const gem = state.board[pos.y][pos.x];
      if (!gem?.special) return [pos];
      const cells = [];
      if (gem.special === "row") {
        for (let x = 0; x < SIZE; x++) cells.push({ x, y: pos.y });
      } else if (gem.special === "col") {
        for (let y = 0; y < SIZE; y++) cells.push({ x: pos.x, y });
      } else {
        for (let y = pos.y - 1; y <= pos.y + 1; y++) {
          for (let x = pos.x - 1; x <= pos.x + 1; x++) {
            if (inside(x, y)) cells.push({ x, y });
          }
        }
      }
      return cells;
    }

    function findMatches() {
      const matches = [];
      for (let y = 0; y < SIZE; y++) {
        let run = [{ x: 0, y }];
        for (let x = 1; x <= SIZE; x++) {
          if (x < SIZE && state.board[y][x]?.type === state.board[y][x - 1]?.type) {
            run.push({ x, y });
          } else {
            if (run.length >= 3) matches.push({ cells: run.slice(), orientation: "row" });
            run = x < SIZE ? [{ x, y }] : [];
          }
        }
      }
      for (let x = 0; x < SIZE; x++) {
        let run = [{ x, y: 0 }];
        for (let y = 1; y <= SIZE; y++) {
          if (y < SIZE && state.board[y][x]?.type === state.board[y - 1][x]?.type) {
            run.push({ x, y });
          } else {
            if (run.length >= 3) matches.push({ cells: run.slice(), orientation: "col" });
            run = y < SIZE ? [{ x, y }] : [];
          }
        }
      }
      return matches;
    }

    function collapse() {
      for (let x = 0; x < SIZE; x++) {
        const column = [];
        for (let y = SIZE - 1; y >= 0; y--) {
          if (state.board[y][x]) column.push(state.board[y][x]);
        }
        for (let y = SIZE - 1, i = 0; y >= 0; y--, i++) {
          state.board[y][x] = column[i] || null;
        }
      }
    }

    function fillBoard() {
      const cfg = levelConfig(state.level);
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (!state.board[y][x]) state.board[y][x] = { id: nextGemId++, type: randomType(cfg.palette), special: null };
        }
      }
    }

    function ensureMoveExists() {
      if (findPossibleMove()) return;
      toast("No moves. Shuffling.");
      shuffleBoard();
    }

    function shuffleBoard() {
      const gems = [];
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) gems.push(state.board[y][x]);
      }
      let guard = 0;
      do {
        shuffle(gems);
        for (let y = 0; y < SIZE; y++) {
          for (let x = 0; x < SIZE; x++) state.board[y][x] = gems[y * SIZE + x];
        }
        guard++;
      } while ((!findPossibleMove() || findMatches().length) && guard < 60);
    }

    async function useShuffleBooster() {
      if (state.busy || state.levelDone || (state.boosters.shuffle || 0) <= 0) return;
      state.busy = true;
      state.selected = null;
      state.activeBooster = null;
      if (!spendBooster("shuffle")) {
        state.busy = false;
        render();
        return;
      }
      clearHint();
      shuffleBoard();
      tickSound(600, 0.05);
      render();
      await wait(260);
      state.busy = false;
      render();
      queueHint();
    }

    function spendBooster(type) {
      if ((state.boosters[type] || 0) <= 0) return false;
      if ((state.assistBoosters[type] || 0) > 0) {
        state.assistBoosters[type]--;
      } else if ((state.inventory[type] || 0) > 0) {
        state.inventory[type]--;
        save();
      } else {
        return false;
      }
      state.boosters[type]--;
      return true;
    }

    function findPossibleMove() {
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          for (const [dx, dy] of [[1, 0], [0, 1]]) {
            const nx = x + dx;
            const ny = y + dy;
            if (!inside(nx, ny)) continue;
            swap({ x, y }, { x: nx, y: ny });
            const possible = findMatches().length > 0;
            swap({ x, y }, { x: nx, y: ny });
            if (possible) return [{ x, y }, { x: nx, y: ny }];
          }
        }
      }
      return null;
    }

    function swap(a, b) {
      [state.board[a.y][a.x], state.board[b.y][b.x]] = [state.board[b.y][b.x], state.board[a.y][a.x]];
    }

    function adjacent(a, b) {
      return Math.abs(a.x - b.x) + Math.abs(a.y - b.y) === 1;
    }

    function inside(x, y) {
      return x >= 0 && x < SIZE && y >= 0 && y < SIZE;
    }

    function checkEnd() {
      const cfg = levelConfig(state.level);
      if (objectiveMet(cfg.objective)) {
        state.levelDone = true;
        state.unlocked = Math.max(state.unlocked, Math.min(MAX_LEVELS, state.level + 1));
        const reward = recordCompletion();
        save();
        showResult(true, cfg, reward);
      } else if (state.moves <= 0) {
        state.levelDone = true;
        recordFailure();
        save();
        showResult(false, cfg, null);
      }
    }

    function recordFailure() {
      const level = String(state.level);
      state.failures[level] = (state.failures[level] || 0) + 1;
    }

    function objectiveMet(objective) {
      if (objective.targetScore && state.score < objective.targetScore) return false;
      if (objective.frostTarget && (state.stats.frostCleared || 0) < objective.frostTarget) return false;
      if (objective.collect) {
        for (const [type, target] of Object.entries(objective.collect)) {
          if ((state.stats.collected[type] || 0) < target) return false;
        }
      }
      return true;
    }

    function showResult(won, cfg, reward) {
      const movesUsed = state.startMoves - state.moves;
      const stars = won ? resultStars() : 0;
      const best = state.completions[String(state.level)];
      const assist = retryAssist(state.level);
      const earned = rewardText(reward);
      el.modalTitle.textContent = won ? "Level Complete" : "Try Again";
      el.modalText.textContent = won
        ? `${"★".repeat(stars)}${"☆".repeat(3 - stars)} Level ${state.level} cleared.${best?.score === state.score ? " New best result." : ""}${earned ? ` Earned: ${earned}.` : ""}`
        : `You ran out of moves before finishing the objective.${assist.message ? ` ${assist.message}` : ""}`;
      el.modalStats.innerHTML = `
        <div class="result-row"><strong>Score</strong><span>${state.score.toLocaleString()}</span></div>
        <div class="result-row"><strong>Moves Used</strong><span>${movesUsed} of ${state.startMoves}</span></div>
        ${earned ? `<div class="result-row"><strong>Reward</strong><span>${earned}</span></div>` : ""}
        <div class="result-row"><strong>Gems Smashed</strong><span>${state.stats.gemsCleared || 0}</span></div>
        <div class="result-row"><strong>Biggest Smash</strong><span>${state.stats.biggestSmash || 0} gems</span></div>
        <div class="result-row"><strong>Best Chain</strong><span>${state.stats.bestChain || 0}x</span></div>
      `;
      el.modalNext.textContent = won ? state.level < MAX_LEVELS ? "Continue" : "Finish" : "Retry";
      el.modal.classList.add("open");
      tickSound(won ? 720 : 180, 0.08);
      render();
    }

    function queueHint() {
      clearHint();
      if (!state.hints) return;
      if (el.menu.classList.contains("open")) return;
      state.hintTimer = setTimeout(() => {
        if (state.busy || state.levelDone) return;
        const move = findPossibleMove();
        if (!move) return;
        for (const pos of move) {
          const node = el.board.querySelector(`[data-key="${key(pos.x, pos.y)}"]`);
          if (node) node.classList.add("hint");
        }
      }, 5200);
    }

    function clearHint() {
      clearTimeout(state.hintTimer);
      el.board.querySelectorAll(".hint").forEach(node => node.classList.remove("hint"));
    }

    function toast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      setTimeout(() => el.toast.classList.remove("show"), 1500);
    }

    function openMenu() {
      clearHint();
      el.menu.classList.remove("title-screen");
      setMenuTab("play");
      el.menu.classList.add("open");
      render();
    }

    function openTitleScreen() {
      clearHint();
      el.menu.classList.add("open", "title-screen");
      render();
    }

    function closeMenu() {
      el.menu.classList.remove("open");
      el.menu.classList.remove("title-screen");
      queueHint();
    }

    function setMenuTab(tab) {
      const levels = tab === "levels";
      el.playTabBtn.classList.toggle("active", !levels);
      el.levelsTabBtn.classList.toggle("active", levels);
      el.playPanel.classList.toggle("active", !levels);
      el.levelsPanel.classList.toggle("active", levels);
      renderLevelGrid();
    }

    function resetProgress() {
      if (!confirm("Clear all Gem Smash progress and restart from Level 1?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.level = 1;
      state.unlocked = 1;
      state.completions = {};
      state.failures = {};
      state.inventory = { hammer: 0, shuffle: 0, line: 0 };
      state.assistBoosters = { hammer: 0, shuffle: 0, line: 0 };
      state.boosters = { hammer: 0, shuffle: 0, line: 0 };
      state.sound = true;
      state.hints = true;
      startLevel(1);
      setMenuTab("play");
      openTitleScreen();
      toast("Progress cleared.");
    }

    function toggleBooster(type) {
      if (state.busy || state.levelDone || (state.boosters[type] || 0) <= 0) return;
      if (type === "shuffle") {
        useShuffleBooster();
        return;
      }
      state.selected = null;
      state.activeBooster = state.activeBooster === type ? null : type;
      render();
      toast(state.activeBooster ? `Tap a gem to use ${type === "line" ? "Blast" : "Hammer"}.` : "Booster canceled.");
    }

    function updateSoundIcon() {
      el.soundBtn.style.opacity = state.sound ? "1" : "0.55";
      el.menuSoundBtn.classList.toggle("on", state.sound);
      el.menuHintsBtn.classList.toggle("on", state.hints);
    }

    function tickSound(freq = 440, gain = 0.04) {
      if (!state.sound) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = tickSound.ctx || (tickSound.ctx = new AudioContext());
      const osc = ctx.createOscillator();
      const vol = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      vol.gain.value = gain;
      osc.connect(vol);
      vol.connect(ctx.destination);
      osc.start();
      vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      osc.stop(ctx.currentTime + 0.1);
    }

    function buzz() {
      tickSound(120, 0.05);
      toast("That swap does not make a match.");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    el.board.addEventListener("pointerdown", onPointerDown);
    el.board.addEventListener("pointermove", onPointerMove);
    el.board.addEventListener("pointerup", onPointerUp);
    el.board.addEventListener("pointercancel", () => { state.pointer = null; });
    el.board.addEventListener("touchstart", onTouchStart, { passive: false });
    el.board.addEventListener("touchmove", onTouchMove, { passive: false });
    el.board.addEventListener("touchend", onTouchEnd, { passive: false });
    el.board.addEventListener("click", onBoardTap);
    el.menuBtn.addEventListener("click", openMenu);
    el.resumeBtn.addEventListener("click", closeMenu);
    el.chooseLevelBtn.addEventListener("click", () => {
      el.menu.classList.remove("title-screen");
      setMenuTab("levels");
      render();
    });
    el.titleClearDataBtn.addEventListener("click", resetProgress);
    el.playTabBtn.addEventListener("click", () => setMenuTab("play"));
    el.levelsTabBtn.addEventListener("click", () => setMenuTab("levels"));
    el.continueBtn.addEventListener("click", closeMenu);
    el.newRunBtn.addEventListener("click", () => {
      startLevel(state.level);
      closeMenu();
    });
    el.clearDataBtn.addEventListener("click", resetProgress);
    el.levelGrid.addEventListener("click", event => {
      const button = event.target.closest(".level-node");
      if (!button || button.disabled) return;
      startLevel(Number(button.dataset.level));
      setMenuTab("play");
      closeMenu();
    });
    el.restartBtn.addEventListener("click", () => startLevel(state.level));
    el.prevBtn.addEventListener("click", () => startLevel(state.level - 1));
    el.nextBtn.addEventListener("click", () => startLevel(state.level + 1));
    el.hammerBtn.addEventListener("click", () => toggleBooster("hammer"));
    el.shuffleBtn.addEventListener("click", () => toggleBooster("shuffle"));
    el.lineBtn.addEventListener("click", () => toggleBooster("line"));
    el.soundBtn.addEventListener("click", () => {
      state.sound = !state.sound;
      save();
      updateSoundIcon();
    });
    el.menuSoundBtn.addEventListener("click", () => {
      state.sound = !state.sound;
      save();
      updateSoundIcon();
    });
    el.menuHintsBtn.addEventListener("click", () => {
      state.hints = !state.hints;
      save();
      updateSoundIcon();
      if (state.hints) queueHint();
      else clearHint();
    });
    el.modalReplay.addEventListener("click", () => startLevel(state.level));
    el.modalNext.addEventListener("click", () => {
      if (objectiveMet(levelConfig(state.level).objective) && state.level < MAX_LEVELS) startLevel(state.level + 1);
      else if (objectiveMet(levelConfig(state.level).objective)) {
        el.modal.classList.remove("open");
        openMenu();
      }
      else startLevel(state.level);
    });

    loadSave();
    startLevel(state.level);
    openTitleScreen();
  </script>
</body>
</html>
